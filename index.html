<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>基北高中交通</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">

<style>
body{margin:0;font-family:sans-serif;}
.topbar{background:#2c3e50;color:white;padding:10px;text-align:center;}
.section{padding:10px;background:#ecf0f1;}
iframe{width:100%;height:45vh;border:none;}

.item{
background:#fff;margin:6px 0;padding:10px;border-radius:8px;
display:flex;justify-content:space-between;align-items:center;
}

.suggestion{background:white;border:1px solid #ccc;max-height:200px;overflow:auto;}
.suggestion div{padding:8px;cursor:pointer;}
.suggestion div:hover{background:#eee;}

.btn-green{background:#27ae60;color:white;border:none;padding:6px 12px;border-radius:6px;}
.btn-blue{background:#2980b9;color:white;border:none;padding:6px 12px;border-radius:6px;}

.compare-header{display:flex;justify-content:space-between;align-items:center;}
.link{color:blue;text-decoration:underline;}

.icon{display:inline-block;width:14px;height:14px;margin-right:6px;}

.star{
width:16px;height:16px;background:#00a65a;
clip-path: polygon(50% 0%,61% 30%,98% 35%,68% 55%,79% 90%,50% 70%,21% 90%,32% 55%,2% 35%,39% 30%);
}
.diamond{background:#00a65a;transform:rotate(45deg);}
.square{background:#6f42c1;}
.circle{background:#6f42c1;border-radius:50%;}
.arrow{
width:14px;height:14px;
background-image:url("五專圖示-透明.png");
background-size:contain;background-repeat:no-repeat;background-position:center;
}

.legend{margin-top:10px;}
.legend-row{display:flex;gap:20px;margin-top:5px;}

#updateBar{
position:fixed;bottom:0;left:0;right:0;
background:#f39c12;color:white;padding:10px;text-align:center;display:none;
}
</style>
</head>

<body>

<div id="updateBar">有新版本 <button onclick="updateApp()">更新</button></div>

<div class="topbar">基北高中交通</div>

<div class="section">
<b>我的地址：</b>
<span id="myAddr"></span>
<button onclick="setAddress()">設定 / 修改</button>
</div>

<div class="section">
<input id="searchInput" placeholder="輸入學校關鍵字">
<button class="btn-green" onclick="addSchool()">加入比較</button>
<button class="btn-blue" onclick="openGuide()">APP使用說明</button>
<div id="suggestBox" class="suggestion"></div>
</div>

<iframe src="https://www.google.com/maps/d/embed?mid=1CwyqZQ0mLL4afResvNH5t1q2QB5xIYw"></iframe>

<div class="section">
<b>比較清單（最多5間）</b>
<div id="list"></div>
</div>

<div class="section">
<div class="compare-header">
<b>比較結果（點擊校名查看路線）</b>
<button class="btn-green" onclick="compare()">產生比較</button>
</div>
<div id="result"></div>

<div class="legend">
<b>圖例說明：</b>

<div class="legend-row">
<div><span class="icon star"></span>公立高中</div>
<div><span class="icon diamond"></span>私立高中</div>
</div>

<div class="legend-row">
<div><span class="icon square"></span>公立高職</div>
<div><span class="icon circle"></span>私立高職</div>
<div><span class="icon arrow"></span>北區五專</div>
</div>

</div>
</div>

<script>

// ===== DOM 綁定（關鍵修正）=====
const searchInput = document.getElementById("searchInput");
const suggestBox = document.getElementById("suggestBox");
const result = document.getElementById("result");
const listDiv = document.getElementById("list");

// 教學
function openGuide(){
window.open("https://youtu.be/AYrfx5Q2wSw","_blank");
}

// PWA
let newWorker;
if('serviceWorker' in navigator){
navigator.serviceWorker.register('./sw.js').then(reg=>{
reg.addEventListener('updatefound',()=>{
newWorker=reg.installing;
newWorker.addEventListener('statechange',()=>{
if(newWorker.state==='installed' && navigator.serviceWorker.controller){
document.getElementById("updateBar").style.display="block";
}
});
});
});
}
function updateApp(){ newWorker?.postMessage({action:'skipWaiting'}); }
navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload());

// ===== 學校資料 =====
const schoolType = {
"板橋高中":"star","中和高中":"star","新莊高中":"star",
"建國中學":"star","北一女中":"star",
"南山高中":"diamond",
"三重商工":"square","松山工農":"square",
"穀保家商":"circle",
"臺北科技大學":"arrow"
};

const schools = Object.keys(schoolType);

let list = JSON.parse(localStorage.getItem("schools")||"[]");
let myAddr = localStorage.getItem("myAddr");

if(!myAddr){ setAddress(); }
else document.getElementById("myAddr").innerText=myAddr;

render();

// 地址
function setAddress(){
let addr=prompt("請輸入地址");
if(!addr)return;
localStorage.setItem("myAddr",addr);
myAddr=addr;
document.getElementById("myAddr").innerText=addr;
}

// 🔍 搜尋（改為安全寫法）
searchInput.addEventListener("input", showSuggestions);

function showSuggestions(){
let input=searchInput.value;
suggestBox.innerHTML="";
if(!input)return;

schools.filter(s=>s.includes(input))
.forEach(s=>{
suggestBox.innerHTML+=`<div data-name="${s}">${s}</div>`;
});
}

// 點擊建議（事件代理）
suggestBox.addEventListener("click",(e)=>{
if(e.target.dataset.name){
selectSchool(e.target.dataset.name);
}
});

function selectSchool(name){
searchInput.value=name;
suggestBox.innerHTML="";
}

// 加入
function addSchool(){
let name=searchInput.value;
if(!name)return alert("請選學校");
if(!schools.includes(name))return alert("請從建議中選擇");
if(list.includes(name))return alert("已加入");
if(list.length>=5)return alert("最多5間");

list.push(name);
save();
searchInput.value="";
}

// 移除
function removeSchool(name){
list=list.filter(s=>s!==name);
save();
}

// 渲染
function render(){
listDiv.innerHTML="";
list.forEach(s=>{
listDiv.innerHTML+=`
<div class="item">
${s}
<button onclick="removeSchool('${s}')">移除</button>
</div>`;
});
}

// 比較
function compare(){
if(!myAddr)return alert("請先設定地址");

result.innerHTML="";

list.forEach(s=>{
let icon=schoolType[s]||"circle";

let url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(myAddr)}&destination=${encodeURIComponent(s + " 台灣")}&travelmode=transit`;

result.innerHTML+=`
<div class="item">
  <div style="display:flex; align-items:center; gap:6px;">
    <span class="icon ${icon}"></span>
    <a class="link" href="${url}" target="_blank">${s}</a>
  </div>
</div>`;
});
}

// 儲存
function save(){
localStorage.setItem("schools",JSON.stringify(list));
render();
}

</script>

</body>
</html>
