<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>基北高中交通</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">

<style>
body { margin:0; font-family:sans-serif; }

.topbar {
  background:#2c3e50;
  color:white;
  padding:10px;
  text-align:center;
}

.section {
  padding:10px;
  background:#ecf0f1;
}

iframe {
  width:100%;
  height:45vh;
  border:none;
}

.btn {
  position:fixed;
  right:15px;
  padding:12px;
  border:none;
  border-radius:20px;
  color:white;
}

.add { bottom:125px; background:#e67e22; }
.compare { bottom:70px; background:#27ae60; }
.share { bottom:15px; background:#3498db; }

.item {
  background:#f4f4f4;
  margin:6px 0;
  padding:10px;
  border-radius:8px;
}

.link {
  color:blue;
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="topbar">基北高中交通</div>

<!-- 我的地址 -->
<div class="section">
<b>我的地址：</b>
<span id="myAddr"></span>
<button onclick="setAddress()">設定 / 修改</button>
</div>

<!-- 搜尋 -->
<div class="section">
<input id="searchInput" placeholder="輸入學校名稱">
<button onclick="searchSchool()">搜尋</button>
<button onclick="addSchool()">加入比較</button>
</div>

<!-- 地圖 -->
<iframe src="https://www.google.com/maps/d/embed?mid=1CwyqZQ0mLL4afResvNH5t1q2QB5xIYw"></iframe>

<!-- 比較清單 -->
<div class="section">
<b>比較清單（最多5間）</b>
<div id="list"></div>
</div>

<!-- 比較結果 -->
<div class="section">
<b>比較結果（點擊查看路線）</b>
<div id="result"></div>
</div>

<button class="btn add" onclick="addSchool()">加入比較</button>
<button class="btn compare" onclick="compare()">產生比較</button>
<button class="btn share" onclick="shareLink()">分享</button>

<script>

let list = JSON.parse(localStorage.getItem("schools")||"[]");
let myAddr = localStorage.getItem("myAddr");

// 初始化
if(!myAddr){
  setAddress();
}else{
  document.getElementById("myAddr").innerText = myAddr;
}

render();

// 設定地址
function setAddress(){
  let addr = prompt("設定我的地址（例如：台北市忠孝東路一段1號）");
  if(!addr) return;

  localStorage.setItem("myAddr", addr);
  myAddr = addr;
  document.getElementById("myAddr").innerText = addr;
}

// 搜尋
function searchSchool(){
  let q = document.getElementById("searchInput").value;
  if(!q) return;

  localStorage.setItem("lastSchool", q);

  let url = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(q);
  window.open(url);
}

// 加入比較
function addSchool(){
  let name = document.getElementById("searchInput").value || localStorage.getItem("lastSchool");

  if(!name){
    name = prompt("請輸入學校名稱（點地圖後可貼上）");
  }

  if(!name) return;

  if(list.includes(name)){
    alert("已加入");
    return;
  }

  if(list.length>=5){
    alert("最多5間");
    return;
  }

  list.push(name);
  save();
}

// 移除
function removeSchool(name){
  list = list.filter(s => s !== name);
  save();
}

// 顯示清單
function render(){
  let div = document.getElementById("list");
  div.innerHTML="";

  list.forEach(s=>{
    div.innerHTML += `
      <div class="item">
        ${s}
        <button onclick="removeSchool('${s}')">退出比較</button>
      </div>
    `;
  });
}

// 🔥 核心：單頁比較
function compare(){
  if(list.length<1){
    alert("請先加入學校");
    return;
  }

  if(!myAddr){
    alert("請先設定我的地址");
    return;
  }

  let div = document.getElementById("result");
  div.innerHTML = "";

  list.forEach(s=>{
    let url = "https://www.google.com/maps/dir/?api=1&origin="
      + encodeURIComponent(myAddr)
      + "&destination=" + encodeURIComponent(s)
      + "&travelmode=transit";

    div.innerHTML += `
      <div class="item">
        <b>${s}</b><br>
        <a class="link" href="${url}" target="_blank">
        👉 查看通勤路線
        </a>
      </div>
    `;
  });

  window.scrollTo(0, document.body.scrollHeight);
}

// 儲存
function save(){
  localStorage.setItem("schools", JSON.stringify(list));
  render();
}

// 分享
function shareLink(){
  let url = location.href;
  if(navigator.share){
    navigator.share({title:"基北高中交通", text:"我都用這個 👉", url:url});
  }else{
    prompt("複製：", url);
  }
}

</script>

</body>
</html>
